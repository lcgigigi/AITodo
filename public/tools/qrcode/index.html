<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个无需联网、在浏览器本地生成二维码的轻量工具。"
    />
    <title>二维码生成器</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17231d;
        --muted: #68736d;
        --paper: #f4f2eb;
        --surface: #fffef9;
        --line: #d9ddd6;
        --accent: #146a46;
        --accent-hover: #0d5739;
        --accent-soft: #e5f1e9;
        --danger: #aa3d36;
        --shadow: 0 24px 64px rgba(30, 45, 37, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--paper);
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% 12%, rgba(255, 255, 255, 0.95), transparent 29rem),
          linear-gradient(135deg, transparent 0 72%, rgba(20, 106, 70, 0.045) 72% 100%),
          var(--paper);
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      .page-shell {
        width: min(1160px, calc(100% - 40px));
        margin: 0 auto;
        padding: 38px 0 32px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 42px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 16px;
        font-weight: 760;
        letter-spacing: -0.02em;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        padding: 7px;
        border-radius: 10px;
        background: var(--ink);
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 2px;
        box-shadow: 0 7px 18px rgba(23, 35, 29, 0.16);
      }

      .brand-mark i {
        display: block;
        border-radius: 1px;
        background: var(--surface);
      }

      .brand-mark i:nth-child(2),
      .brand-mark i:nth-child(4),
      .brand-mark i:nth-child(8) {
        opacity: 0;
      }

      .brand-mark i:nth-child(5) {
        background: #70d5a5;
      }

      .local-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .local-badge::before {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #32a66b;
        box-shadow: 0 0 0 4px rgba(50, 166, 107, 0.12);
        content: "";
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
        overflow: hidden;
        min-height: 610px;
        border: 1px solid rgba(217, 221, 214, 0.9);
        border-radius: 28px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .editor-panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
        padding: 56px 58px 50px;
      }

      .eyebrow {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 760;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 540px;
        margin: 0;
        font-size: clamp(36px, 4.5vw, 62px);
        font-weight: 780;
        letter-spacing: -0.065em;
        line-height: 1.06;
      }

      .lede {
        max-width: 510px;
        margin: 20px 0 34px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.75;
      }

      .input-wrap {
        position: relative;
      }

      textarea {
        display: block;
        width: 100%;
        min-height: 174px;
        resize: vertical;
        padding: 19px 20px 42px;
        border: 1px solid var(--line);
        border-radius: 16px;
        outline: none;
        color: var(--ink);
        background: #fbfbf7;
        font-size: 15px;
        line-height: 1.65;
        transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      textarea::placeholder {
        color: #9aa29d;
      }

      textarea:hover {
        border-color: #bdc6c0;
      }

      textarea:focus-visible {
        border-color: var(--accent);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(20, 106, 70, 0.1);
      }

      .counter {
        position: absolute;
        right: 16px;
        bottom: 14px;
        color: #89928d;
        font-size: 12px;
        pointer-events: none;
      }

      .error-message {
        min-height: 22px;
        margin: 9px 0 3px;
        color: var(--danger);
        font-size: 13px;
        line-height: 1.55;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 18px;
        border: 1px solid transparent;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 680;
        transition: transform 150ms ease, background 150ms ease, border-color 150ms ease,
          opacity 150ms ease;
      }

      .button:active:not(:disabled) {
        transform: translateY(1px);
      }

      .button:focus-visible {
        outline: 3px solid rgba(20, 106, 70, 0.2);
        outline-offset: 2px;
      }

      .button svg {
        width: 17px;
        height: 17px;
        stroke-width: 1.9;
      }

      .button-primary {
        padding-inline: 22px;
        color: white;
        background: var(--accent);
        box-shadow: 0 8px 22px rgba(20, 106, 70, 0.2);
      }

      .button-primary:hover {
        background: var(--accent-hover);
      }

      .button-secondary {
        border-color: var(--line);
        color: var(--ink);
        background: transparent;
      }

      .button-secondary:hover:not(:disabled) {
        border-color: #bdc6c0;
        background: #f7f7f2;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.42;
      }

      .privacy-note {
        display: flex;
        align-items: center;
        gap: 9px;
        margin: auto 0 0;
        padding-top: 34px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .privacy-note svg {
        flex: 0 0 auto;
        width: 16px;
        height: 16px;
        color: var(--accent);
      }

      .preview-panel {
        position: relative;
        display: flex;
        min-width: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 48px 42px;
        border-left: 1px solid var(--line);
        background:
          linear-gradient(rgba(20, 106, 70, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(20, 106, 70, 0.05) 1px, transparent 1px),
          #eef3ee;
        background-size: 24px 24px;
      }

      .preview-panel::before {
        position: absolute;
        width: 360px;
        height: 360px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.76);
        filter: blur(3px);
        content: "";
      }

      .preview-content {
        position: relative;
        z-index: 1;
        display: flex;
        width: 100%;
        flex-direction: column;
        align-items: center;
      }

      .qr-frame {
        display: grid;
        width: min(318px, 100%);
        aspect-ratio: 1;
        place-items: center;
        padding: 22px;
        border: 1px solid rgba(23, 35, 29, 0.08);
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 22px 46px rgba(24, 45, 34, 0.13);
        transition: transform 240ms ease, box-shadow 240ms ease;
      }

      .qr-frame.has-code:hover {
        transform: translateY(-3px);
        box-shadow: 0 26px 52px rgba(24, 45, 34, 0.17);
      }

      #qrcode {
        display: none;
        width: 100%;
        height: 100%;
      }

      #qrcode canvas {
        display: block !important;
        width: 100% !important;
        height: 100% !important;
        image-rendering: pixelated;
      }

      #qrcode img {
        display: none !important;
      }

      .placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #7d8982;
        text-align: center;
      }

      .placeholder-icon {
        display: grid;
        width: 78px;
        height: 78px;
        margin-bottom: 19px;
        place-items: center;
        border: 1px dashed #aab7af;
        border-radius: 22px;
        background: #f8faf7;
      }

      .placeholder-icon svg {
        width: 34px;
        height: 34px;
        color: var(--accent);
        opacity: 0.76;
      }

      .placeholder strong {
        margin-bottom: 7px;
        color: var(--ink);
        font-size: 15px;
      }

      .placeholder span {
        font-size: 13px;
        line-height: 1.55;
      }

      .preview-caption {
        min-height: 45px;
        max-width: 320px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
        text-align: center;
        word-break: break-all;
      }

      .preview-actions {
        display: flex;
        gap: 10px;
        margin-top: 13px;
      }

      .preview-actions .button {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(8px);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        z-index: 10;
        padding: 11px 16px;
        border-radius: 10px;
        color: white;
        background: var(--ink);
        box-shadow: 0 12px 32px rgba(23, 35, 29, 0.2);
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, 12px);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.is-visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .qr-frame.is-created {
        animation: code-in 380ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      @keyframes code-in {
        from {
          opacity: 0.45;
          transform: scale(0.96);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 850px) {
        .page-shell {
          width: min(680px, calc(100% - 28px));
          padding-top: 24px;
        }

        .topbar {
          margin-bottom: 24px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .editor-panel {
          padding: 42px 34px 36px;
        }

        .preview-panel {
          min-height: 510px;
          border-top: 1px solid var(--line);
          border-left: 0;
        }

        .privacy-note {
          margin-top: 32px;
        }
      }

      @media (max-width: 520px) {
        .page-shell {
          width: calc(100% - 20px);
          padding: 18px 0 20px;
        }

        .local-badge span {
          display: none;
        }

        .workspace {
          border-radius: 21px;
        }

        .editor-panel {
          padding: 34px 21px 29px;
        }

        h1 {
          font-size: 39px;
        }

        .lede {
          margin: 17px 0 27px;
        }

        textarea {
          min-height: 156px;
        }

        .actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .button-primary {
          grid-column: 1 / -1;
        }

        .preview-panel {
          min-height: 460px;
          padding: 39px 20px;
        }

        .preview-actions {
          width: 100%;
        }

        .preview-actions .button {
          flex: 1;
          padding-inline: 10px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <div class="brand" aria-label="二维码生成器">
          <span class="brand-mark" aria-hidden="true">
            <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
          </span>
          <span>二维码生成器</span>
        </div>
        <div class="local-badge"><span>本地运行 · 数据不上传</span></div>
      </header>

      <section class="workspace" aria-labelledby="page-title">
        <div class="editor-panel">
          <p class="eyebrow">Quick QR</p>
          <h1 id="page-title">把任意内容<br />变成二维码</h1>
          <p class="lede">输入文字、网址、联系方式或编号，点击生成后即可扫码或下载图片。</p>

          <label class="input-wrap">
            <span style="position: absolute; width: 1px; height: 1px; overflow: hidden"
              >二维码内容</span
            >
            <textarea
              id="contentInput"
              autofocus
              spellcheck="false"
              placeholder="例如：https://intranet.example.com 或一段文字…"
              aria-describedby="inputHint inputError"
            ></textarea>
            <span class="counter" id="counter">0 字</span>
          </label>
          <p class="error-message" id="inputError" role="alert" aria-live="polite"></p>

          <div class="actions">
            <button class="button button-primary" id="generateButton" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                <path d="M14 14h3v3h-3zM18 18h3v3h-3zM18 14h3M14 18v3"></path>
              </svg>
              生成二维码
            </button>
            <button class="button button-secondary" id="pasteButton" type="button">粘贴</button>
            <button class="button button-secondary" id="clearButton" type="button">清空</button>
          </div>

          <p class="privacy-note" id="inputHint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M12 22s8-3.6 8-10V5l-8-3-8 3v7c0 6.4 8 10 8 10Z"></path>
              <path d="m9 12 2 2 4-4"></path>
            </svg>
            所有内容仅在当前浏览器中处理，页面不会发送或保存你的数据。
          </p>
        </div>

        <aside class="preview-panel" aria-label="二维码预览">
          <div class="preview-content">
            <div class="qr-frame" id="qrFrame">
              <div class="placeholder" id="placeholder">
                <span class="placeholder-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                    <path d="M14 14h3v3h-3zM18 18h3v3h-3zM18 14h3M14 18v3"></path>
                  </svg>
                </span>
                <strong>二维码将在这里出现</strong>
                <span>输入内容后点击“生成二维码”</span>
              </div>
              <div id="qrcode" aria-label="生成的二维码"></div>
            </div>
            <p class="preview-caption" id="previewCaption">尚未生成</p>
            <div class="preview-actions">
              <button class="button button-secondary" id="downloadButton" type="button" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                  <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"></path>
                </svg>
                下载 PNG
              </button>
              <button class="button button-secondary" id="copyButton" type="button" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                  <rect x="8" y="8" width="12" height="12" rx="2"></rect>
                  <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path>
                </svg>
                复制内容
              </button>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- qrcode.js (MIT, Copyright 2012 davidshimjs) is embedded for offline use. -->

    <script>
      (function () {
        'use strict'

        var input = document.getElementById('contentInput')
        var counter = document.getElementById('counter')
        var errorMessage = document.getElementById('inputError')
        var generateButton = document.getElementById('generateButton')
        var pasteButton = document.getElementById('pasteButton')
        var clearButton = document.getElementById('clearButton')
        var downloadButton = document.getElementById('downloadButton')
        var copyButton = document.getElementById('copyButton')
        var placeholder = document.getElementById('placeholder')
        var qrElement = document.getElementById('qrcode')
        var qrFrame = document.getElementById('qrFrame')
        var previewCaption = document.getElementById('previewCaption')
        var toast = document.getElementById('toast')
        var qrCode = null
        var generatedContent = ''
        var toastTimer = null

        function updateCounter() {
          counter.textContent = input.value.length + ' 字'
          if (errorMessage.textContent) errorMessage.textContent = ''
        }

        function showToast(message) {
          window.clearTimeout(toastTimer)
          toast.textContent = message
          toast.classList.add('is-visible')
          toastTimer = window.setTimeout(function () {
            toast.classList.remove('is-visible')
          }, 1800)
        }

        function truncate(value, maxLength) {
          if (value.length <= maxLength) return value
          return value.slice(0, maxLength - 1) + '…'
        }

        function resetPreview() {
          generatedContent = ''
          if (qrCode) qrCode.clear()
          qrElement.style.display = 'none'
          placeholder.style.display = 'flex'
          qrFrame.classList.remove('has-code', 'is-created')
          previewCaption.textContent = '尚未生成'
          downloadButton.disabled = true
          copyButton.disabled = true
        }

        function generateCode() {
          var content = input.value.trim()

          if (!content) {
            errorMessage.textContent = '请先输入需要生成二维码的内容。'
            input.focus()
            return
          }

          if (typeof window.QRCode === 'undefined') {
            errorMessage.textContent = '二维码组件加载失败，请确认 qrcode.min.js 与页面放在同一目录。'
            return
          }

          errorMessage.textContent = ''

          try {
            if (!qrCode) {
              qrCode = new QRCode(qrElement, {
                width: 600,
                height: 600,
                colorDark: '#17231d',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M,
              })
            }

            qrCode.clear()
            qrCode.makeCode(content)
            generatedContent = content
            placeholder.style.display = 'none'
            qrElement.style.display = 'block'
            qrFrame.classList.add('has-code')
            qrFrame.classList.remove('is-created')
            void qrFrame.offsetWidth
            qrFrame.classList.add('is-created')
            previewCaption.textContent = truncate(content.replace(/\s+/g, ' '), 72)
            downloadButton.disabled = false
            copyButton.disabled = false
          } catch (error) {
            resetPreview()
            errorMessage.textContent = '内容过长，超出了单个二维码的容量，请缩短后重试。'
            console.error('二维码生成失败：', error)
          }
        }

        function getQrCanvas() {
          return qrElement.querySelector('canvas')
        }

        function downloadCode() {
          var sourceCanvas = getQrCanvas()
          if (!sourceCanvas || !generatedContent) return

          var quietZone = 48
          var output = document.createElement('canvas')
          output.width = sourceCanvas.width + quietZone * 2
          output.height = sourceCanvas.height + quietZone * 2
          var context = output.getContext('2d')
          context.fillStyle = '#ffffff'
          context.fillRect(0, 0, output.width, output.height)
          context.imageSmoothingEnabled = false
          context.drawImage(sourceCanvas, quietZone, quietZone)

          var link = document.createElement('a')
          link.download = 'qrcode-' + new Date().getTime() + '.png'
          link.href = output.toDataURL('image/png')
          document.body.appendChild(link)
          link.click()
          link.remove()
          showToast('二维码图片已下载')
        }

        function copyGeneratedContent() {
          if (!generatedContent) return

          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard
              .writeText(generatedContent)
              .then(function () {
                showToast('内容已复制')
              })
              .catch(function () {
                fallbackCopy(generatedContent)
              })
          } else {
            fallbackCopy(generatedContent)
          }
        }

        function fallbackCopy(content) {
          var temporaryInput = document.createElement('textarea')
          temporaryInput.value = content
          temporaryInput.setAttribute('readonly', '')
          temporaryInput.style.position = 'fixed'
          temporaryInput.style.opacity = '0'
          document.body.appendChild(temporaryInput)
          temporaryInput.select()

          try {
            document.execCommand('copy')
            showToast('内容已复制')
          } catch (error) {
            showToast('复制失败，请手动复制')
          }

          temporaryInput.remove()
        }

        function pasteContent() {
          if (!navigator.clipboard || !window.isSecureContext) {
            showToast('当前浏览器不允许读取剪贴板，请手动粘贴')
            input.focus()
            return
          }

          navigator.clipboard
            .readText()
            .then(function (text) {
              input.value = text
              updateCounter()
              input.focus()
            })
            .catch(function () {
              showToast('无法读取剪贴板，请手动粘贴')
              input.focus()
            })
        }

        input.addEventListener('input', updateCounter)
        input.addEventListener('keydown', function (event) {
          if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
            event.preventDefault()
            generateCode()
          }
        })
        generateButton.addEventListener('click', generateCode)
        pasteButton.addEventListener('click', pasteContent)
        clearButton.addEventListener('click', function () {
          input.value = ''
          updateCounter()
          resetPreview()
          input.focus()
        })
        downloadButton.addEventListener('click', downloadCode)
        copyButton.addEventListener('click', copyGeneratedContent)
      })()
    </script>
  </body>
</html>
